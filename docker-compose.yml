services:
  termix:
    image: ghcr.io/lukegus/termix:latest
    container_name: termix
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      PORT: "8080"
      GUACD_HOST: "guacd"
    depends_on:
      - guacd

  guacd:
    image: guacamole/guacd:1.6.0
    container_name: termix-guacd
    restart: unless-stopped
    ports:
      - "4822:4822"

networks:
  default:
    external: true
    name: nginx-proxy
