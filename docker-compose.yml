services:
  termix:
    # Default: pull prebuilt image.
    # To rebuild from local source instead, run: docker compose up --build
    image: ghcr.io/lukegus/termix:latest
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: termix
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      PORT: "8080"
      GUACD_HOST: "guacd"
    depends_on:
      - guacd
    networks:
      - termix-net

  guacd:
    image: guacamole/guacd:1.6.0
    container_name: guacd
    restart: unless-stopped
    # Dev deploy: expose guacd on host port 4823 instead of default 4822
    ports:
      - "4823:4822"
    networks:
      - termix-net

networks:
  termix-net:
    driver: bridge
